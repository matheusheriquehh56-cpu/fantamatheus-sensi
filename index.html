<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantamatheus Sensi</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a0033, #4b0082);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.card {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

button {
  background: #8a2be2;
  border: none;
  padding: 12px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #6a1bbf;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.result {
  margin-top: 10px;
  background: #0f0f2d;
  padding: 10px;
  border-radius: 10px;
}

footer {
  text-align: center;
  font-size: 12px;
  margin-top: 20px;
  opacity: 0.7;
}


/* Splash animation */
#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #4b0082, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}

#splash.active {
  opacity: 1;
  pointer-events: all;
}

.loader {
  border: 5px solid #fff;
  border-top: 5px solid #8a2be2;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin-top: 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

</style></head><body><div id="splash">
  <h1>🎮 Abrindo Free Fire...</h1>
  <div class="loader"></div>
</div><header>🎯 Fantamatheus Sensi</header><div class="container"><!-- GERADOR --><div class="card">
<h3>📱 Gerar Sensi por Celular</h3><select id="celular">
<option value="fraco">Celular Fraco</option>
<option value="medio">Celular Médio</option>
<option value="top">Celular Top</option>
</select><button onclick="gerarSensi()">Gerar Sensibilidade</button>

<div class="result" id="resultado"></div>
<button onclick="copiarSensi()">📋 Copiar Sensi</button>
</div><!-- FAMOSOS --><div class="card">
<h3>🔥 Sensi de Famosos</h3><select id="famoso">
<option value="fantasma">Fantasma</option>
<option value="nobru">Nobru</option>
<option value="cerol">Cerol</option>
</select><button onclick="mostrarFamoso()">Ver Sensi</button>

<div class="result" id="famosoResultado"></div>
<button onclick="copiarFamoso()">📋 Copiar Sensi do Famoso</button>
</div><!-- ABRIR FREE FIRE --><div class="card">
<h3>🎮 Abrir Free Fire</h3>
<button onclick="abrirFreeFire()">Iniciar Jogo</button>
</div></div><!-- DPI AJUSTE --><div class="card">
<h3>⚙️ Ajuste por DPI</h3>
<select id="dpi">
<option value="baixo">DPI Baixo (até 400)</option>
<option value="medio">DPI Médio (401–600)</option>
<option value="alto">DPI Alto (601+)</option>
</select>
</div><footer>
Criado por Fantamatheus 🚀
</footer><script>
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gerarSensi() {
  let tipo = document.getElementById("celular").value;
  let dpi = document.getElementById("dpi").value;

  let base = rand(90, 100);

  // ajuste por celular
  if (tipo === "fraco") base -= 5;
  if (tipo === "top") base += 3;

  // ajuste por DPI
  if (dpi === "baixo") base += 3; // precisa de mais sensi
  if (dpi === "alto") base -= 5; // DPI alto já é rápido

  let geral = Math.min(100, base);
  let red = Math.min(100, geral);
  let x2 = red - 3;
  let x4 = rand(70, 90);
  let awm = rand(40, 60);

  document.getElementById("resultado").innerHTML = `
  🔥 Geral: ${geral}<br>
  🔴 Red Dot (FULL VERMELHO): ${red}<br>
  🎯 2x: ${x2}<br>
  🎯 4x: ${x4}<br>
  🎯 AWM: ${awm}<br>
  ⚙️ DPI: ${dpi}
  `;
}<br>
  🔴 Red Dot (FULL VERMELHO): ${red}<br>
  🎯 2x: ${x2}<br>
  🎯 4x: ${x4}<br>
  🎯 AWM: ${awm}
  `;
}<br>
  Red Dot: ${red}<br>
  2x: ${x2}<br>
  4x: ${x4}<br>
  AWM: ${awm}
  `;
}

function mostrarFamoso() {
  let famoso = document.getElementById("famoso").value;
  let resultado = "";

  if (famoso === "fantasma") {
    resultado = "🔥 Geral: 100<br>🔴 Red Dot: 100<br>2x: 95<br>4x: 85<br>AWM: 55";
  }

  if (famoso === "nobru") {
    resultado = "🔥 Geral: 100<br>🔴 Red Dot: 100<br>2x: 95<br>4x: 85<br>AWM: 60";
  }

  if (famoso === "cerol") {
    resultado = "🔥 Geral: 95<br>🔴 Red Dot: 95<br>2x: 90<br>4x: 80<br>AWM: 50";
  }

  document.getElementById("famosoResultado").innerHTML = resultado;
}

function copiarSensi() {
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Sensi copiada!");
}

function copiarFamoso() {
  let texto = document.getElementById("famosoResultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Sensi copiada!");
}

function abrirFreeFire() {
  let splash = document.getElementById("splash");
  splash.classList.add("active");

  setTimeout(() => {
    window.location.href = "intent://#Intent;package=com.dts.freefireth;end";

    setTimeout(() => {
      window.location.href = "https://play.google.com/store/apps/details?id=com.dts.freefireth";
    }, 2000);

  }, 2000);
}, 2000);
}
</script></body>
</html>
