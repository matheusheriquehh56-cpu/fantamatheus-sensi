<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantamatheus Sensi</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a0033, #4b0082);
  color: white;
}
header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}
.card {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}
button {
  background: #8a2be2;
  border: none;
  padding: 12px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  width: 100%;
  margin-top: 10px;
}
select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}
.result {
  margin-top: 10px;
  background: #0f0f2d;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🎯 Fantamatheus Sensi</header>

<div class="container">

<div class="card">
<h3>📱 Gerar Sensi</h3>

<select id="celular">
<option value="fraco">Celular Fraco</option>
<option value="medio">Celular Médio</option>
<option value="top">Celular Top</option>
</select>

<select id="dpi">
<option value="baixo">DPI Baixo</option>
<option value="medio">DPI Médio</option>
<option value="alto">DPI Alto</option>
</select>

<button onclick="gerarSensi()">Gerar Sensibilidade</button>
<button onclick="copiar()">📋 Copiar</button>

<div class="result" id="resultado"></div>
</div>

</div>

<script>
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gerarSensi() {
  let tipo = document.getElementById("celular").value;
  let dpi = document.getElementById("dpi").value;

  let base = rand(90, 100);

  if (tipo === "fraco") base -= 5;
  if (tipo === "top") base += 3;

  if (dpi === "baixo") base += 3;
  if (dpi === "alto") base -= 5;

  let geral = Math.min(100, base);
  let red = Math.min(100, geral);
  let x2 = red - 3;
  let x4 = rand(70, 90);
  let awm = rand(40, 60);

  document.getElementById("resultado").innerHTML = `
  🔥 Geral: ${geral}<br>
  🔴 Red Dot: ${red}<br>
  🎯 2x: ${x2}<br>
  🎯 4x: ${x4}<br>
  🎯 AWM: ${awm}
  `;
}

function copiar() {
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Sensi copiada!");
}
</script>

</body>
</html>
